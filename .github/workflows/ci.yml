name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Verify workspace
        run: npm run verify:workspace

      - name: Install Playwright (Chromium + deps)
        run: npx playwright install --with-deps chromium

      - name: Lint (optional)
        run: npm run lint

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1

      - name: Start Supabase
        run: supabase start

      - name: Build
        run: npm run build
        env:
          CI: "true"
          NEXT_PUBLIC_SUPABASE_URL: "http://127.0.0.1:54321"
          NEXT_PUBLIC_SUPABASE_ANON_KEY: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJyb2xlIjoiYW5vbiJ9.mock-anon-key-mock-anon-key-mock-anon-key"
          SUPABASE_SERVICE_ROLE_KEY: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJyb2xlIjoic2VydmljZV9yb2xlIn0.mock-service-role-key-mock-service-role-key"
          RESEND_API_KEY: "re_mock_12345"
          STRIPE_SECRET_KEY: "sk_test_mock123"
          STRIPE_WEBHOOK_SECRET: "whsec_mock123"
          GA_TRACKING_ID: "G-MOCK123"
          CRON_SECRET: "mock_cron_secret"
          POSTHOG_KEY: "phc_mock123"

      - name: Smoke test (serve)
        run: node scripts/smoke-serve.mjs
        env:
          CI: "true"
          NEXT_PUBLIC_SUPABASE_URL: "http://127.0.0.1:54321"
          NEXT_PUBLIC_SUPABASE_ANON_KEY: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJyb2xlIjoiYW5vbiJ9.mock-anon-key-mock-anon-key-mock-anon-key"
          SUPABASE_SERVICE_ROLE_KEY: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJyb2xlIjoic2VydmljZV9yb2xlIn0.mock-service-role-key-mock-service-role-key"
          RESEND_API_KEY: "re_mock_12345"
          STRIPE_SECRET_KEY: "sk_test_mock123"
          STRIPE_WEBHOOK_SECRET: "whsec_mock123"
          GA_TRACKING_ID: "G-MOCK123"
          CRON_SECRET: "mock_cron_secret"
          POSTHOG_KEY: "phc_mock123"

      - name: E2E tests (serve)
        run: node scripts/e2e-serve.mjs
        env:
          CI: "true"
          NEXT_PUBLIC_SUPABASE_URL: "http://127.0.0.1:54321"
          NEXT_PUBLIC_SUPABASE_ANON_KEY: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJyb2xlIjoiYW5vbiJ9.mock-anon-key-mock-anon-key-mock-anon-key"
          SUPABASE_SERVICE_ROLE_KEY: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJyb2xlIjoic2VydmljZV9yb2xlIn0.mock-service-role-key-mock-service-role-key"
          RESEND_API_KEY: "re_mock_12345"
          STRIPE_SECRET_KEY: "sk_test_mock123"
          STRIPE_WEBHOOK_SECRET: "whsec_mock123"
          GA_TRACKING_ID: "G-MOCK123"
          CRON_SECRET: "mock_cron_secret"
          POSTHOG_KEY: "phc_mock123"
