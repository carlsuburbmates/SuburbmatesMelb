name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Verify workspace
        run: npm run verify:workspace

      - name: Install Playwright (Chromium + deps)
        run: npx playwright install --with-deps chromium

      - name: Lint (optional)
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          RESEND_API_KEY: "dummy"
          STRIPE_SECRET_KEY: "dummy"
          STRIPE_WEBHOOK_SECRET: "dummy"
          NEXT_PUBLIC_SUPABASE_URL: "http://localhost:54321"
          NEXT_PUBLIC_SUPABASE_ANON_KEY: "dummy"
          SUPABASE_SERVICE_ROLE_KEY: "dummy"
          GA_TRACKING_ID: "dummy"
          CRON_SECRET: "dummy"
          POSTHOG_KEY: "dummy"
          CI: "true"

      - name: Smoke test (serve)
        run: node scripts/smoke-serve.mjs

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1

      - name: Start Supabase
        run: supabase start --ignore-health-check

      - name: E2E tests (serve)
        run: node scripts/e2e-serve.mjs
        env:
          RESEND_API_KEY: "dummy"
          STRIPE_SECRET_KEY: "dummy"
          STRIPE_WEBHOOK_SECRET: "dummy"
          NEXT_PUBLIC_SUPABASE_URL: "http://127.0.0.1:54321"
          NEXT_PUBLIC_SUPABASE_ANON_KEY: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJzdWIiOiIxMjM0NTY3ODkwIiwibmFtZSI6IkpvaG4gRG9lIiwiaWF0IjoxNTE2MjM5MDIyfQ.SflKxwRJSMeKKF2QT4fwpMeJf36POk6yJV_adQssw5c"
          SUPABASE_SERVICE_ROLE_KEY: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJzdWIiOiIxMjM0NTY3ODkwIiwibmFtZSI6IkpvaG4gRG9lIiwiaWF0IjoxNTE2MjM5MDIyfQ.SflKxwRJSMeKKF2QT4fwpMeJf36POk6yJV_adQssw5c"
          GA_TRACKING_ID: "dummy"
          CRON_SECRET: "dummy"
          POSTHOG_KEY: "dummy"
          CI: "true"
