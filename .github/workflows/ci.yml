name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Verify workspace
        run: npm run verify:workspace

      - name: Install Playwright (Chromium + deps)
        run: npx playwright install --with-deps chromium

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Start Supabase local emulator
        run: supabase start

      - name: Lint (optional)
        run: npm run lint --if-present

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: http://127.0.0.1:54321
          NEXT_PUBLIC_SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZteWpzcGtxZWhkeGJtdWxwbml2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE2ODYzNjMwOTAsImV4cCI6MTk5NzAyMzg5MH0.aZlZ_5V-T4G_-411t5hQn9aI5hXn0I_aH_n_4iO_G_0
