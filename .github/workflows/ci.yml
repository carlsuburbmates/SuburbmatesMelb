name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Verify workspace
        run: npm run verify:workspace

      - name: Install Playwright (Chromium + deps)
        run: npx playwright install --with-deps chromium

      - name: Start Supabase local emulator
        uses: supabase/setup-cli@v1
        with:
          version: latest
      - run: supabase start

      - name: Lint (optional)
        run: npm run lint --if-present

      - name: Build
        run: npm run build
        env:
          CI: "true"
          RESEND_API_KEY: "re_123456789"
          STRIPE_SECRET_KEY: "sk_test_123"
          STRIPE_WEBHOOK_SECRET: "whsec_123"
          NEXT_PUBLIC_SUPABASE_URL: "http://127.0.0.1:54321"
          NEXT_PUBLIC_SUPABASE_ANON_KEY: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRlc3QiLCJyb2xlIjoiYW5vbiIsImlhdCI6MTYxNjQxMTA1MCwiZXhwIjoxOTMyMTcxMDUwfQ.fake_anon_key"
          SUPABASE_SERVICE_ROLE_KEY: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRlc3QiLCJyb2xlIjoic2VydmljZV9yb2xlIiwiaWF0IjoxNjE2NDExMDUwLCJleHAiOjE5MzIxNzEwNTB9.fake_service_key"
          GA_TRACKING_ID: "G-12345"
          CRON_SECRET: "cron_secret"
          POSTHOG_KEY: "phc_123"

      - name: Smoke test (serve)
        run: node scripts/smoke-serve.mjs
        env:
          CI: "true"
          RESEND_API_KEY: "re_123456789"
          STRIPE_SECRET_KEY: "sk_test_123"
          STRIPE_WEBHOOK_SECRET: "whsec_123"
          NEXT_PUBLIC_SUPABASE_URL: "http://127.0.0.1:54321"
          NEXT_PUBLIC_SUPABASE_ANON_KEY: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRlc3QiLCJyb2xlIjoiYW5vbiIsImlhdCI6MTYxNjQxMTA1MCwiZXhwIjoxOTMyMTcxMDUwfQ.fake_anon_key"
          SUPABASE_SERVICE_ROLE_KEY: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRlc3QiLCJyb2xlIjoic2VydmljZV9yb2xlIiwiaWF0IjoxNjE2NDExMDUwLCJleHAiOjE5MzIxNzEwNTB9.fake_service_key"
          GA_TRACKING_ID: "G-12345"
          CRON_SECRET: "cron_secret"
          POSTHOG_KEY: "phc_123"

      - name: E2E tests (serve)
        run: node scripts/e2e-serve.mjs
        env:
          CI: "true"
          RESEND_API_KEY: "re_123456789"
          STRIPE_SECRET_KEY: "sk_test_123"
          STRIPE_WEBHOOK_SECRET: "whsec_123"
          NEXT_PUBLIC_SUPABASE_URL: "http://127.0.0.1:54321"
          NEXT_PUBLIC_SUPABASE_ANON_KEY: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRlc3QiLCJyb2xlIjoiYW5vbiIsImlhdCI6MTYxNjQxMTA1MCwiZXhwIjoxOTMyMTcxMDUwfQ.fake_anon_key"
