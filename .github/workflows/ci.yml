name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Verify workspace
        run: npm run verify:workspace

      - name: Install Playwright (Chromium + deps)
        run: npx playwright install --with-deps chromium

      - name: Lint (optional)
        run: npm run lint --if-present

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1

      - name: Start Supabase Local Emulator
        run: supabase start

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: "http://localhost:54321"
          NEXT_PUBLIC_SUPABASE_ANON_KEY: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InN1cGFiYXNlIiwicm9sZSI6ImFub24iLCJpYXQiOjE2ODcyMzA5MjQsImV4cCI6MTk4OTUzMDkyNH0.placeholder"
          SUPABASE_SERVICE_ROLE_KEY: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InN1cGFiYXNlIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTY4NzIzMDkyNCwiZXhwIjoxOTg5NTMwOTI0fQ.placeholder"
          RESEND_API_KEY: "re_test_123456789"
          STRIPE_SECRET_KEY: "sk_test_123456789"
          STRIPE_WEBHOOK_SECRET: "whsec_123456789"
          GA_TRACKING_ID: "G-123456789"
          CRON_SECRET: "cron_secret_123"
          POSTHOG_KEY: "phc_123456789"
          CI: "true"

      - name: Smoke test (serve)
        run: node scripts/smoke-serve.mjs
