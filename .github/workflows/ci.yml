name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Verify workspace
        run: npm run verify:workspace

      - name: Install Playwright (Chromium + deps)
        run: npx playwright install --with-deps chromium

      - name: Lint (optional)
        run: npm run lint --if-present

      - name: Build
        run: npm run build
        env:
          CI: "true"
          RESEND_API_KEY: "re_123456789"
          STRIPE_SECRET_KEY: "sk_test_123"
          STRIPE_WEBHOOK_SECRET: "whsec_123"
          NEXT_PUBLIC_SUPABASE_URL: "http://localhost:54321"
          NEXT_PUBLIC_SUPABASE_ANON_KEY: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.e30.y_hX1lDqCgZlHnJwBkq1uC_Q9qZ-N0T_fGzJvF0lX80"
          SUPABASE_SERVICE_ROLE_KEY: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.e30.y_hX1lDqCgZlHnJwBkq1uC_Q9qZ-N0T_fGzJvF0lX80"
          GA_TRACKING_ID: "G-1234567890"
          CRON_SECRET: "cron123"
          POSTHOG_KEY: "phc_123"

      - name: Smoke test (serve)
        run: node scripts/smoke-serve.mjs
        env:
          CI: "true"
          RESEND_API_KEY: "re_123456789"
          STRIPE_SECRET_KEY: "sk_test_123"
          STRIPE_WEBHOOK_SECRET: "whsec_123"
          NEXT_PUBLIC_SUPABASE_URL: "http://localhost:54321"
          NEXT_PUBLIC_SUPABASE_ANON_KEY: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.e30.y_hX1lDqCgZlHnJwBkq1uC_Q9qZ-N0T_fGzJvF0lX80"
          SUPABASE_SERVICE_ROLE_KEY: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.e30.y_hX1lDqCgZlHnJwBkq1uC_Q9qZ-N0T_fGzJvF0lX80"
          GA_TRACKING_ID: "G-1234567890"
          CRON_SECRET: "cron123"
          POSTHOG_KEY: "phc_123"

      - name: E2E tests (serve)
        run: node scripts/e2e-serve.mjs
        env:
          CI: "true"
          RESEND_API_KEY: "re_123456789"
          STRIPE_SECRET_KEY: "sk_test_123"
          STRIPE_WEBHOOK_SECRET: "whsec_123"
          NEXT_PUBLIC_SUPABASE_URL: "http://localhost:54321"
          NEXT_PUBLIC_SUPABASE_ANON_KEY: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.e30.y_hX1lDqCgZlHnJwBkq1uC_Q9qZ-N0T_fGzJvF0lX80"
          SUPABASE_SERVICE_ROLE_KEY: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.e30.y_hX1lDqCgZlHnJwBkq1uC_Q9qZ-N0T_fGzJvF0lX80"
