name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Verify workspace
        run: npm run verify:workspace

      - name: Install Playwright (Chromium + deps)
        run: npx playwright install --with-deps chromium

      - name: Lint (optional)
        run: npm run lint --if-present

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: "https://mock.supabase.co"
          NEXT_PUBLIC_SUPABASE_ANON_KEY: "mock_anon_key"
          SUPABASE_SERVICE_ROLE_KEY: "mock_service_key"
          RESEND_API_KEY: "mock_resend_key"
          STRIPE_SECRET_KEY: "mock_stripe_secret"
          STRIPE_WEBHOOK_SECRET: "mock_stripe_webhook"
          GA_TRACKING_ID: "mock_ga"
          CRON_SECRET: "mock_cron"
          POSTHOG_KEY: "mock_posthog"
          CI: "true"

      - name: Smoke test (serve)
        run: node scripts/smoke-serve.mjs

      - name: E2E tests (serve)
        run: node scripts/e2e-serve.mjs
