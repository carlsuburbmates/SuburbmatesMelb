name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_SUPABASE_URL: "https://placeholder.supabase.co"
      NEXT_PUBLIC_SUPABASE_ANON_KEY: "placeholder-key"
      SUPABASE_SERVICE_ROLE_KEY: "service-role-placeholder"
      STRIPE_SECRET_KEY: "sk_test_placeholder"
      STRIPE_WEBHOOK_SECRET: "whsec_placeholder"
      STRIPE_CLIENT_ID: "ca_test_placeholder"
      STRIPE_PRODUCT_VENDOR_PRO: "prod_vendor_pro"
      STRIPE_PRICE_VENDOR_PRO_MONTH: "price_vendor_pro_month"
      STRIPE_PRODUCT_FEATURED_30D: "prod_featured_30d"
      STRIPE_PRICE_FEATURED_30D: "price_featured_30d"
      RESEND_API_KEY: "re_placeholder"
      NEXT_PHASE: "phase-1"
      CI: "true"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Verify workspace
        run: npm run verify:workspace

      - name: Install Playwright (Chromium + deps)
        run: npx playwright install --with-deps chromium

      - name: Lint (optional)
        run: npm run lint --if-present

      - name: Build
        run: npm run build

      - name: Smoke test (serve)
        run: node scripts/smoke-serve.mjs

      - name: E2E tests (serve)
        run: node scripts/e2e-serve.mjs
