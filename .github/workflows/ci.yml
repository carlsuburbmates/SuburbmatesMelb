      - name: E2E tests (serve)
        run: node scripts/e2e-serve.mjs
        env:
          NEXT_PUBLIC_SUPABASE_URL: http://127.0.0.1:54321
          NEXT_PUBLIC_SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJrc3hkbnZnZnRzZGtkcWtsbnVxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3MDU1ODAyNTcsImV4cCI6MjAyMTE1NjI1N30.mock_anon_key_mock_anon_key_mock_anon_key_mock_anon_key
          SUPABASE_SERVICE_ROLE_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJrc3hkbnZnZnRzZGtkcWtsbnVxIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTcwNTU4MDI1NywiZXhwIjoyMDIxMTU2MjU3fQ.mock_service_key_mock_service_key_mock_service_key
          RESEND_API_KEY: re_mock123
          STRIPE_SECRET_KEY: sk_test_mock123
          STRIPE_WEBHOOK_SECRET: whsec_mock123
          GA_TRACKING_ID: G-MOCK123
          CRON_SECRET: mock_cron_secret
