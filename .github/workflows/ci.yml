name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 8

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: pnpm install

      - name: Verify workspace
        run: pnpm run verify:workspace

      - name: Install Playwright (Chromium + deps)
        run: npx playwright install --with-deps chromium

      - name: Lint (optional)
        run: pnpm run lint

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1

      - name: Start Supabase local emulator
        run: supabase start

      - name: Build
        run: pnpm run build
        env:
          CI: "true"
          NEXT_PUBLIC_SUPABASE_URL: "http://127.0.0.1:54321"
          NEXT_PUBLIC_SUPABASE_ANON_KEY: "dummy"
          SUPABASE_SERVICE_ROLE_KEY: "dummy"
          RESEND_API_KEY: "dummy"
          STRIPE_SECRET_KEY: "dummy"
          STRIPE_WEBHOOK_SECRET: "dummy"
          GA_TRACKING_ID: "dummy"
          CRON_SECRET: "dummy"
          POSTHOG_KEY: "dummy"

      - name: Smoke test (serve)
        run: node scripts/smoke-serve.mjs
        env:
          CI: "true"
          NEXT_PUBLIC_SUPABASE_URL: "http://127.0.0.1:54321"
          NEXT_PUBLIC_SUPABASE_ANON_KEY: "dummy"
          SUPABASE_SERVICE_ROLE_KEY: "dummy"
          RESEND_API_KEY: "dummy"
          STRIPE_SECRET_KEY: "dummy"
          STRIPE_WEBHOOK_SECRET: "dummy"
          GA_TRACKING_ID: "dummy"
          CRON_SECRET: "dummy"
          POSTHOG_KEY: "dummy"

      - name: E2E tests (serve)
        run: node scripts/e2e-serve.mjs
        env:
          CI: "true"
          NEXT_PUBLIC_SUPABASE_URL: "http://127.0.0.1:54321"
          NEXT_PUBLIC_SUPABASE_ANON_KEY: "dummy"
          SUPABASE_SERVICE_ROLE_KEY: "dummy"
          RESEND_API_KEY: "dummy"
          STRIPE_SECRET_KEY: "dummy"
          STRIPE_WEBHOOK_SECRET: "dummy"
          GA_TRACKING_ID: "dummy"
          CRON_SECRET: "dummy"
          POSTHOG_KEY: "dummy"
