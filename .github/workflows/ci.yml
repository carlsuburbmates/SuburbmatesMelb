name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_SUPABASE_URL: "https://placeholder.supabase.co"
      NEXT_PUBLIC_SUPABASE_ANON_KEY: "placeholder-key"
      SUPABASE_SERVICE_ROLE_KEY: "placeholder-service-role-key"
      STRIPE_SECRET_KEY: "placeholder"
      STRIPE_WEBHOOK_SECRET: "placeholder"
      STRIPE_CLIENT_ID: "placeholder"
      STRIPE_PRODUCT_VENDOR_PRO: "placeholder"
      STRIPE_PRICE_VENDOR_PRO_MONTH: "placeholder"
      STRIPE_PRODUCT_FEATURED_30D: "placeholder"
      STRIPE_PRICE_FEATURED_30D: "placeholder"
      RESEND_API_KEY: "re_123"
      NEXT_PUBLIC_SITE_URL: "http://localhost:3010"
      NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: "pk_test_placeholder"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Verify workspace
        run: npm run verify:workspace

      - name: Install Playwright (Chromium + deps)
        run: npx playwright install --with-deps chromium

      - name: Lint (optional)
        run: npm run lint --if-present

      - name: Build
        run: npm run build

      - name: Smoke test (serve)
        run: node scripts/smoke-serve.mjs

      - name: E2E tests (serve)
        run: node scripts/e2e-serve.mjs
