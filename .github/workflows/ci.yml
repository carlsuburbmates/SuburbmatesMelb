name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_SUPABASE_URL: "https://example.supabase.co"
      NEXT_PUBLIC_SUPABASE_ANON_KEY: "dummy-anon-key"
      SUPABASE_SERVICE_ROLE_KEY: "dummy-service-role-key"
      STRIPE_SECRET_KEY: "dummy-stripe-secret"
      STRIPE_WEBHOOK_SECRET: "dummy-webhook-secret"
      NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: "dummy-publishable-key"
      STRIPE_CLIENT_ID: "dummy-client-id"
      STRIPE_PRODUCT_VENDOR_PRO: "dummy-prod-pro"
      STRIPE_PRICE_VENDOR_PRO_MONTH: "dummy-price-pro"
      STRIPE_PRODUCT_FEATURED_30D: "dummy-prod-featured"
      STRIPE_PRICE_FEATURED_30D: "dummy-price-featured"
      RESEND_API_KEY: "re_dummy_123"
      NEXTAUTH_SECRET: "dummy-nextauth-secret"
      NEXTAUTH_URL: "http://localhost:3000"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Verify workspace
        run: npm run verify:workspace

      - name: Install Playwright (Chromium + deps)
        run: npx playwright install --with-deps chromium

      - name: Lint (optional)
        run: npm run lint --if-present

      - name: Build
        run: npm run build

      - name: Smoke test (serve)
        run: node scripts/smoke-serve.mjs

      - name: E2E tests (serve)
        run: node scripts/e2e-serve.mjs
