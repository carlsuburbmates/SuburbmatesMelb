          NEXT_PUBLIC_SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InF3ZXJ0eXVpb3Bhc2RmZ2hqa2x6IiwiX3BpZCI6InEyMzR3cWVydHl1aW9wIiwiZXhwIjoyMDk2MDIyMzI3LCJpYXQiOjE3MjUyODcwMzZ9.mS8nOWeO6eQx6n8O37_y9kR669R3A_1k_O8uKzP5oU
          SUPABASE_SERVICE_ROLE_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InF3ZXJ0eXVpb3Bhc2RmZ2hqa2x6IiwiX3BpZCI6InEyMzR3cWVydHl1aW9wIiwiZXhwIjoyMDk2MDIyMzI3LCJpYXQiOjE3MjUyODcwMzZ9.mS8nOWeO6eQx6n8O37_y9kR669R3A_1k_O8uKzP5oU
          STRIPE_SECRET_KEY: test
          STRIPE_WEBHOOK_SECRET: test
