name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Verify workspace
        run: npm run verify:workspace

      - name: Install Playwright (Chromium + deps)
        run: npx playwright install --with-deps chromium

      - name: Lint (optional)
        run: npm run lint

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Start Supabase
        run: supabase start

      - name: Build
        run: cp .env.example .env && npm run build
        env:
          CI: "true"
          NEXT_PUBLIC_SUPABASE_URL: "http://127.0.0.1:54321"
          NEXT_PUBLIC_SUPABASE_ANON_KEY: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJyb2xlIjoiYW5vbiIsImV4cCI6MTc3MzkyMjkyNn0.fn4i82dVh_7cHcr-II8xbSVLS9XAnFP47OiZsYBmL8M"
          SUPABASE_SERVICE_ROLE_KEY: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJyb2xlIjoic2VydmljZV9yb2xlIiwiZXhwIjoxNzczOTIyOTI2fQ.y29b7Q-E38E-qIuS5kOQO9y8i24z9Kx-hN8Bwz8U2Hw"
          RESEND_API_KEY: "re_mock_key"
          STRIPE_SECRET_KEY: "sk_test_mock"
          STRIPE_WEBHOOK_SECRET: "whsec_mock"
          POSTHOG_KEY: "phc_mock"
          GA_TRACKING_ID: "G-MOCK"
          CRON_SECRET: "mock_cron_secret"

      - name: Smoke test (serve)
        run: node scripts/smoke-serve.mjs
        env:
          CI: "true"
          NEXT_PUBLIC_SUPABASE_URL: "http://127.0.0.1:54321"
          NEXT_PUBLIC_SUPABASE_ANON_KEY: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJyb2xlIjoiYW5vbiIsImV4cCI6MTc3MzkyMjkyNn0.fn4i82dVh_7cHcr-II8xbSVLS9XAnFP47OiZsYBmL8M"
          SUPABASE_SERVICE_ROLE_KEY: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJyb2xlIjoic2VydmljZV9yb2xlIiwiZXhwIjoxNzczOTIyOTI2fQ.y29b7Q-E38E-qIuS5kOQO9y8i24z9Kx-hN8Bwz8U2Hw"

      - name: E2E tests (serve)
        run: node scripts/e2e-serve.mjs
        env:
          CI: "true"
          NEXT_PUBLIC_SUPABASE_URL: "http://127.0.0.1:54321"
          NEXT_PUBLIC_SUPABASE_ANON_KEY: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJyb2xlIjoiYW5vbiIsImV4cCI6MTc3MzkyMjkyNn0.fn4i82dVh_7cHcr-II8xbSVLS9XAnFP47OiZsYBmL8M"
